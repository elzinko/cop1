name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One run per ref; a new push cancels the previous in-flight run to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · build · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # The web package (@cop1/web) is a Vite app excluded from the root `build`,
      # `test`, and `lint` scripts, so its own typecheck, build, and tests run here
      # to close that CI-coverage gap — a type, bundler, or test failure in
      # packages/web would otherwise slip through the pipeline.
      - name: Typecheck (web)
        run: pnpm --filter @cop1/web typecheck

      - name: Build (web)
        run: pnpm --filter @cop1/web build

      - name: Test (web)
        run: pnpm --filter @cop1/web test

      # Tests that spin up throwaway git repos set their own LOCAL identity, so
      # no global git config is needed here (proves the tests are hermetic).
      - name: Test
        run: pnpm test
