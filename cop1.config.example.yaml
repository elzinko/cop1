project:
  name: cop1
  path: "."

daemon:
  port: 4242

sprint:
  default_duration_hours: 2

resources:
  ram_budget_night_gb: 48
  ram_budget_day_gb: 20
  suspension_threshold_percent: 75
  polling_interval_ms: 1000

# LLM routing — adjust model names to match your `ollama list`
# REMINDER: see features/REMINDER-llm-models.md for recommended models
llm_routing:
  default: "llama3.2"
  dev: "llama3.2"
  reviewer: "llama3.2"

llm_fallback:
  default: "llama3.2"

git:
  auto_merge: false

blocage_rules: {}

schedule:
  auto_start: []
