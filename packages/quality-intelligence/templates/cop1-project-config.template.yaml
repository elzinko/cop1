# cop1 project configuration
# This file is generated by cop1 init and customized per-project

project:
  key: {{projectKey}}
  name: {{projectName}}
  version: {{projectVersion}}

quality:
  sonarcloud:
    consent: false  # Set to true to enable SonarCloud analysis (sends code to cloud)
  thresholds:
    coverage_min_percent: 80
    duplication_max_percent: 3
